<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Hangman</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}

h1 { color: #00ffcc; }

canvas {
  background: #222;
  margin: 20px auto;
  display: block;
  border-radius: 10px;
}

#word {
  font-size: 40px;
  letter-spacing: 10px;
  margin: 20px;
}

#letters button {
  margin: 5px;
  padding: 10px;
  width: 38px;
  font-size: 16px;
  cursor: pointer;
  border-radius: 6px;
  border: none;
}

#status {
  font-size: 22px;
  margin-top: 15px;
}

#top {
  display: flex;
  justify-content: space-around;
  max-width: 500px;
  margin: auto;
}

#reset {
  margin-top: 15px;
  padding: 10px 20px;
  background: #00ffcc;
  border: none;
  cursor: pointer;
  border-radius: 8px;
}
</style>
</head>

<body>

<!-- 🎮 شاشة البداية -->
<div id="startScreen" style="
position: fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#111;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
">
  <h1 style="color:#00ffcc;font-size:40px;">🎮 Hangman Pro</h1>
  <p>Guess the word before the man is hanged 💀</p>

  <button onclick="startFromMenu()" style="
    padding:15px 30px;
    font-size:20px;
    margin-top:20px;
    background:#00ffcc;
    border:none;
    border-radius:10px;
    cursor:pointer;
  ">
    ▶ Start Game
  </button>
</div>

<h1>🎮 Hangman Pro</h1>

<div id="top">
  <div>🏆 Score: <span id="score">0</span></div>
  <div>💀 Wrong: <span id="wrong">0</span>/6</div>
  <div>⭐ Level: <span id="level">1</span></div>
</div>

<canvas id="hangman" width="200" height="250"></canvas>

<div id="word"></div>

<div id="hint" style="margin-top:10px; color:#00ffcc;"></div>

<div id="letters"></div>

<div id="status"></div>

<button id="reset" onclick="startGame()">Restart</button>

<script>

/* 🔊 الأصوات */
const soundGood = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
const soundWrong = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const soundWin = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const soundLose = new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg");

function play(sound){
  sound.currentTime = 0;
  sound.play();
}

function startFromMenu() {
  document.getElementById("startScreen").style.display = "none";
  startGame();
}

let selectedWord = "";
let guessed = [];
let wrong = 0;
let score = 0;
let level = 1;

let winStreak = 0;
let loseStreak = 0;

let currentHint = "";

const maxWrong = 6;

let canvas = document.getElementById("hangman");
let ctx = canvas.getContext("2d");

/* 🧠 منع التكرار */
let usedWords = [];

/* 🧠 ذكاء اختيار الصعوبة */
function adaptiveLevel() {
  if (winStreak >= 2) level++;
  if (loseStreak >= 2 && level > 1) level--;

  if (level < 1) level = 1;
}

/* 🔁 كلمات + تلميحات */
function generateWord() {
  const easy = [
    {word:"cat", hint:"🐱 Animal"},
    {word:"dog", hint:"🐶 Animal"},
    {word:"tree", hint:"🌳 Nature"},
    {word:"book", hint:"📚 You read it"},
    {word:"game", hint:"🎮 Fun activity"}
  ];

  const medium = [
    {word:"javascript", hint:"💻 Programming language"},
    {word:"rocket", hint:"🚀 Goes to space"},
    {word:"window", hint:"🪟 In your house"},
    {word:"planet", hint:"🌍 In space"},
    {word:"button", hint:"🔘 You click it"}
  ];

  const hard = [
    {word:"asynchronous", hint:"⚡ Programming concept"},
    {word:"algorithm", hint:"🧠 Step-by-step solution"},
    {word:"developer", hint:"👨‍💻 Builds software"},
    {word:"hangman", hint:"🎮 This game"}
  ];

  let list;

  if (level <= 2) list = easy;
  else if (level <= 5) list = medium;
  else list = hard;

  /* 🔥 بدون تكرار */
  let available = list.filter(w => !usedWords.includes(w.word));

  if (available.length === 0) {
    usedWords = [];
    available = list;
  }

  let item = available[Math.floor(Math.random()*available.length)];

  usedWords.push(item.word);

  currentHint = item.hint;
  return item.word;
}

function startGame() {
  adaptiveLevel();

  selectedWord = generateWord();
  guessed = [];
  wrong = 0;

  document.getElementById("wrong").innerText = wrong;
  document.getElementById("status").innerText = "";
  document.getElementById("level").innerText = level;

  document.getElementById("hint").innerText = "💡 Hint: " + currentHint;

  createLetters();
  updateWord();
  drawHangman();
}

function createLetters() {
  let div = document.getElementById("letters");
  div.innerHTML = "";

  let row = null;

  for (let i = 97; i <= 122; i++) {

    if ((i - 97) % 13 === 0) {
      row = document.createElement("div");
      div.appendChild(row);
    }

    let btn = document.createElement("button");
    btn.innerText = String.fromCharCode(i);
    btn.onclick = () => guess(btn.innerText, btn);

    row.appendChild(btn);
  }
}

function guess(letter, btn) {
  btn.disabled = true;
  guessed.push(letter);

  if (!selectedWord.includes(letter)) {
    wrong++;
    document.getElementById("wrong").innerText = wrong;
    drawHangman();

    play(soundWrong);
  } else {
    play(soundGood);
  }

  updateWord();
  check();
}

function updateWord() {
  let display = "";

  for (let c of selectedWord) {
    display += guessed.includes(c) ? c + " " : "_ ";
  }

  document.getElementById("word").innerText = display;
}

function check() {
  let win = selectedWord.split("").every(c => guessed.includes(c));

  if (win) {
    document.getElementById("status").innerText = "🎉 You Win! Next Level";

    score += 10;
    level++;

    winStreak++;
    loseStreak = 0;

    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;

    play(soundWin);

    disableAll();

    setTimeout(() => startGame(), 1000);
  }

  if (wrong >= maxWrong) {
    document.getElementById("status").innerText = "💀 Game Over: " + selectedWord;

    loseStreak++;
    winStreak = 0;

    play(soundLose);

    disableAll();

    setTimeout(() => startGame(), 1500);
  }
}

function disableAll() {
  document.querySelectorAll("#letters button").forEach(b => b.disabled = true);
}

/* 🎨 الرسم */
function drawHangman() {
  ctx.clearRect(0,0,200,250);

  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(20,230);
  ctx.lineTo(180,230);
  ctx.stroke();

  if (wrong > 0) {
    ctx.beginPath();
    ctx.moveTo(50,230);
    ctx.lineTo(50,20);
    ctx.stroke();
  }

  if (wrong > 1) {
    ctx.beginPath();
    ctx.moveTo(50,20);
    ctx.lineTo(130,20);
    ctx.stroke();
  }

  if (wrong > 2) {
    ctx.beginPath();
    ctx.moveTo(130,20);
    ctx.lineTo(130,50);
    ctx.stroke();
  }

  if (wrong > 3) {
    ctx.beginPath();
    ctx.arc(130,70,20,0,Math.PI*2);
    ctx.stroke();
  }

  if (wrong > 4) {
    ctx.beginPath();
    ctx.moveTo(130,90);
    ctx.lineTo(130,150);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(130,110);
    ctx.lineTo(100,130);
    ctx.moveTo(130,110);
    ctx.lineTo(160,130);
    ctx.stroke();
  }

  if (wrong > 5) {
    ctx.beginPath();
    ctx.moveTo(130,150);
    ctx.lineTo(110,190);
    ctx.moveTo(130,150);
    ctx.lineTo(150,190);
    ctx.stroke();
  }
}

</script>

</body>
</html>
